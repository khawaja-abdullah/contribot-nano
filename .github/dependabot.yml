version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "18:00"
      timezone: "Asia/Karachi"
    open-pull-requests-limit: 1
    reviewers:
      - "khawaja-abdullah"
    commit-message:
      prefix: "deps(github-actions)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "actions"
      graalvm:
        patterns:
          - "graalvm"