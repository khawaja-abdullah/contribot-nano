name: Contribot Nano - Scheduled Digest

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours, on the hour, UTC
  workflow_dispatch:

jobs:
  run-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Run Contribot Nano
        env:
          GITHUB_API_TOKEN: ${{ secrets.GH_TOKEN }}
        run: java -jar target/contribot-nano-1.0-SNAPSHOT.jar

      - name: Send digest email
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'Contribot Nano Digest'
          to: khawaja.abdullah.ansar@gmail.com
          from: Contribot Nano
          html_body: file://dist/digest.html