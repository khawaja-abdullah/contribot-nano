name: CI CD (Native)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.6
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: 'maven'
      - name: Package (native)
        run: mvn clean package -Pnative -DskipTests
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contribot-nano-native
          path: target/contribot-nano-native
  run:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: contribot-nano-native
          path: /target
      - name: Make executable
        run: chmod +x /target/contribot-nano-native
      - name: Run
        env:
          GITHUB_API_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_ISSUE_SEARCH_QUERY_CREATEDAFTER_LOOKBACK_ENABLED: true
          GITHUB_ISSUE_SEARCH_QUERY_CREATEDAFTER_LOOKBACK_HOURS: 1
        run: ./target/contribot-nano-native