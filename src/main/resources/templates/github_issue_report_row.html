<tr style="border-bottom: 1px solid rgba(208, 215, 222, 0.5);">
    <td style="padding: 16px 8px; vertical-align: middle; border-bottom: 1px solid rgba(208, 215, 222, 0.4);">
        <div dir="auto" style="font-size: 15px; font-weight: 600; color: #24292f; line-height: 1.4; word-break: break-word;">
            {{TITLE}}
        </div>
    </td>
    <td style="padding: 16px 8px; vertical-align: middle; text-align: right; border-bottom: 1px solid rgba(208, 215, 222, 0.4);">
        <a href="{{URL}}" target="_blank" rel="noopener noreferrer"
           style="display: inline-block; padding: 5px 12px; font-size: 12px; font-weight: 500; line-height: 18px; color: #ffffff; background-color: #2da44e; border: 1px solid rgba(27,31,36,0.15); border-radius: 6px; text-decoration: none; white-space: nowrap;">
            Contribute
        </a>
    </td>
</tr>
