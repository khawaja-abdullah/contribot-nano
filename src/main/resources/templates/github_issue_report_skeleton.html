<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribot Nano Issue Digest</title>
</head>
<body style="margin: 0; padding: 40px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #f6f8fa; color: #24292f; -webkit-font-smoothing: antialiased;">
<div style="max-width: 680px; margin: 0 auto; background-color: #ffffff; border: 1px solid #d0d7de; border-radius: 8px; padding: 32px; box-shadow: 0 4px 12px rgba(27, 31, 35, 0.04);">

    <div style="border-bottom: 1px solid #d0d7de; padding-bottom: 20px; margin-bottom: 24px;">
        <h1 style="font-size: 22px; font-weight: 600; margin: 0; color: #24292f; letter-spacing: -0.5px;">
            🚀 Contribot Nano Digest
        </h1>
        <p style="font-size: 14px; color: #57606a; margin: 6px 0 0 0; line-height: 1.5;">
            Lightweight Github issue tracker for open source enthusiasts
        </p>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
            <tr style="border-bottom: 2px solid #d0d7de;">
                <th style="padding: 12px 8px; font-size: 13px; font-weight: 600; color: #57606a; text-transform: uppercase; letter-spacing: 0.5px;">
                    Filtered Issues
                </th>
            </tr>
            </thead>
            <tbody>
            {{ISSUES}}
            </tbody>
        </table>
    </div>

    <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid #d0d7de; text-align: center;">
        <p style="font-size: 12px; color: #57606a; margin: 0; line-height: 1.6;">
            Generated by <a href="https://github.com/khawaja-abdullah/contribot-nano"
                            style="color: #0969da; text-decoration: none; font-weight: 600;">Contribot Nano</a>
        </p>
    </div>

</div>
</body>
</html>
